
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Умник Voice MVP</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="topbar">
  <div class="logo">Умник AI</div>
  <button id="voiceCallBtn">📞</button>
</div>

<div class="chat">
  <div class="msg">
    Привет! Нажми на кнопку звонка и поговори со мной 🎓
  </div>
</div>

<div id="voiceModal" class="hidden modal">
  <div class="card">
    <div class="head">
      <h2>Созвон с Умником</h2>
      <button id="closeVoice">✕</button>
    </div>

    <div class="fox">🦊</div>

    <div id="voiceStatus">Готов помочь</div>

    <button id="micButton" class="mic">🎤</button>

    <div id="voiceTranscript" class="transcript"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
